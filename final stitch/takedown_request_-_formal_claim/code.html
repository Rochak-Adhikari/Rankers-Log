<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rankers Log - Takedown Request</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f20d0d",
                        "background-light": "#f8f5f5",
                        "background-dark": "#0a0505", // Darker background for more contrast
                        "surface-dark": "#1a1010",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"],
                    },
                    boxShadow: {
                        "glow": "0 0 15px rgba(242, 13, 13, 0.3)",
                        "glow-sm": "0 0 8px rgba(242, 13, 13, 0.2)",
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* Custom scrollbar for text area */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #221010; 
        }
        ::-webkit-scrollbar-thumb {
            background: #492222; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f20d0d; 
        }

        .glass-panel {
            background: rgba(26, 16, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(242, 13, 13, 0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .input-glow:focus {
            box-shadow: 0 0 0 1px #f20d0d, 0 0 10px rgba(242, 13, 13, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white overflow-hidden h-screen w-full relative">
<!-- Background Elements (Simulating the blurred app behind) -->
<div class="absolute inset-0 z-0 flex flex-col pointer-events-none opacity-40 blur-[2px]">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#492222] px-10 py-3 bg-[#130505]">
<div class="flex items-center gap-4 text-white">
<div class="size-8 text-primary">
<span class="material-symbols-outlined text-[32px]">shield_person</span>
</div>
<h2 class="text-white text-xl font-bold leading-tight tracking-[-0.015em] font-display">Rankers Log</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex items-center gap-9">
<a class="text-white/60 text-sm font-medium leading-normal hover:text-white" href="#">Home</a>
<a class="text-white/60 text-sm font-medium leading-normal hover:text-white" href="#">Rankings</a>
<a class="text-white/60 text-sm font-medium leading-normal hover:text-white" href="#">Community</a>
<a class="text-white text-sm font-medium leading-normal border-b-2 border-primary" href="#">Settings</a>
</div>
<div class="flex gap-2">
<button class="flex items-center justify-center rounded-lg size-10 bg-[#492222] text-primary border border-primary/30">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex items-center justify-center rounded-lg size-10 bg-[#2d1212] text-white">
<span class="material-symbols-outlined">person</span>
</button>
</div>
</div>
</header>
<main class="flex-1 p-10 grid grid-cols-12 gap-6">
<!-- Simulated background content -->
<div class="col-span-3 bg-[#1a0a0a] rounded-xl h-96 border border-[#331111]"></div>
<div class="col-span-6 bg-[#1a0a0a] rounded-xl h-full border border-[#331111] flex flex-col gap-4 p-6">
<div class="h-8 w-1/3 bg-[#331111] rounded"></div>
<div class="h-4 w-full bg-[#220a0a] rounded"></div>
<div class="h-4 w-full bg-[#220a0a] rounded"></div>
<div class="h-4 w-2/3 bg-[#220a0a] rounded"></div>
</div>
<div class="col-span-3 bg-[#1a0a0a] rounded-xl h-80 border border-[#331111]"></div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
<!-- Modal Content -->
<div class="glass-panel w-full max-w-2xl rounded-xl flex flex-col relative overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Decorative Accent Line -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-80"></div>
<!-- Modal Header -->
<div class="px-8 pt-8 pb-4 flex flex-col items-center justify-center text-center">
<div class="mb-4 size-14 rounded-full bg-primary/10 border border-primary/30 flex items-center justify-center text-primary shadow-glow-sm">
<span class="material-symbols-outlined text-[32px]">gavel</span>
</div>
<h2 class="text-white tracking-[0.2em] text-2xl font-bold font-display uppercase">Formal Takedown Claim</h2>
<p class="text-primary/80 text-sm font-normal mt-2 flex items-center gap-1.5 bg-primary/5 px-3 py-1 rounded-full border border-primary/10">
<span class="material-symbols-outlined text-[16px]">warning</span>
                    Submission of false claims may result in account termination.
                </p>
</div>
<!-- Modal Body (Scrollable form) -->
<div class="px-8 pb-8 overflow-y-auto max-h-[70vh] custom-scrollbar">
<form class="flex flex-col gap-6">
<!-- Section 1: Target -->
<div class="space-y-4">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Category Select -->
<div class="flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium uppercase tracking-wide">Violation Category</label>
<div class="relative">
<select class="w-full h-12 bg-[#2d1212] border border-[#492222] text-white text-sm rounded-lg focus:ring-1 focus:ring-primary focus:border-primary input-glow appearance-none px-4 pr-10 font-display">
<option disabled="" selected="" value="">Select a reason...</option>
<option value="copyright">Copyright Infringement</option>
<option value="harassment">Harassment / Bullying</option>
<option value="defamation">Defamation</option>
<option value="privacy">Privacy Violation</option>
<option value="impersonation">Impersonation</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-white/50">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Claimant ID -->
<div class="flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium uppercase tracking-wide">Claimant Identity</label>
<div class="relative">
<input class="w-full h-12 bg-[#2d1212] border border-[#492222] text-white text-sm rounded-lg focus:ring-1 focus:ring-primary focus:border-primary input-glow px-4 pl-10 placeholder:text-white/20 font-display" placeholder="Legal Full Name" type="text"/>
<div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-white/50">
<span class="material-symbols-outlined text-[20px]">badge</span>
</div>
</div>
</div>
</div>
<!-- Target URL -->
<div class="flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium uppercase tracking-wide">Target Content URL</label>
<div class="relative group">
<input class="w-full h-12 bg-[#2d1212] border border-[#492222] text-primary font-mono text-sm rounded-lg focus:ring-1 focus:ring-primary focus:border-primary input-glow px-4 pl-10 placeholder:text-white/20" placeholder="https://rankerslog.com/content/id-xxxxx" type="url"/>
<div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-primary/70 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">link</span>
</div>
</div>
</div>
</div>
<!-- Section 2: Details -->
<div class="flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium uppercase tracking-wide">Detailed Description of Infringement</label>
<textarea class="w-full h-32 bg-[#2d1212] border border-[#492222] text-white text-sm rounded-lg focus:ring-1 focus:ring-primary focus:border-primary input-glow p-4 resize-none placeholder:text-white/20 font-display" placeholder="Please describe exactly how the content violates our terms or your rights..."></textarea>
</div>
<!-- Section 3: Legal Check -->
<div class="flex items-start gap-3 p-4 rounded-lg bg-[#2d1212]/50 border border-[#492222]/50">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-gray-600 bg-[#1a0a0a] text-primary focus:ring-primary focus:ring-offset-[#1a0a0a]" id="legal-confirm" type="checkbox"/>
</div>
<label class="text-xs text-white/70 font-light leading-relaxed" for="legal-confirm">
                            I hereby state that the information in this notification is accurate and that I am authorized to act on behalf of the owner of an exclusive right that is allegedly infringed. I understand that making a false claim is a punishable offense.
                        </label>
</div>
</form>
</div>
<!-- Modal Footer -->
<div class="px-8 py-6 border-t border-[#331111] bg-[#150505]/80 flex flex-col-reverse sm:flex-row justify-end gap-3 sm:gap-4">
<button class="px-6 h-12 rounded-lg border border-[#492222] text-white hover:bg-[#2d1212] transition-colors text-sm font-bold uppercase tracking-wider">
                    Cancel
                </button>
<button class="px-8 h-12 rounded-lg bg-primary hover:bg-red-600 text-white shadow-glow transition-all hover:-translate-y-0.5 text-sm font-bold uppercase tracking-wider flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">send</span>
                    Transmit Claim
                </button>
</div>
</div>
</div>
</body></html>
